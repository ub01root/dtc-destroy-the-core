name: iDTC
main: com.imperiordevelopment.dtc.IDTCPlugin
version: 1.0.0
api-version: '1.20'
author: Imperior Development
website: https://imperior-stellar.vercel.app
softdepend: [PlaceholderAPI, WorldGuard]
commands:
  idtc:
    description: Main command for iDTC
    usage: /idtc
    aliases: [dtc]
permissions:
  idtc.admin:
    description: Admin permissions for iDTC
    default: op
  idtc.wand:
    description: Access to iDTC wand command
    default: op
  idtc.editor:
    description: Access to iDTC editor GUI
    default: op
  idtc.stats:
    description: View core damage stats
    default: true
